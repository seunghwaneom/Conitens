<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>
    <meta
      name="description"
      content="Diegetic 3D command-center visualization for the Conitens agent orchestration system."
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; }
      /* Sub-AC 6c: HUD pulse animation for connecting / degraded status dots */
      @keyframes hud-pulse {
        0%,100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.35; transform: scale(0.7); }
      }
      /* Sub-AC 3d: navigation focus highlight — gentle glow on focused node badge */
      @keyframes hud-focus-glow {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.65; }
      }
      /* Sub-AC 3d: level step — active level label shimmer */
      @keyframes hud-level-shimmer {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.7; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
